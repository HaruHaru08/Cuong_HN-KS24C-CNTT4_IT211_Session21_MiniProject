spring.application.name=miniprj

# DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/technova_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Settings
technova.app.jwtSecret=SecretKeyToGenJWTsMustBeLongEnoughForHMACSHA256Algorithm1234567890
technova.app.jwtExpirationMs=86400000
